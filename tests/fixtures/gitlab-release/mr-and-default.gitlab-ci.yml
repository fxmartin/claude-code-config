# Fixture (Story 23.4-001): scopes to the default branch (so the CI_DEFAULT_BRANCH
# string check passes) but ALSO adds a merge_request_event rule — releasing on
# every MR. The validator must reject it: the release job is default-branch only.
stages:
  - release

publish-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_COMMIT_TITLE =~ /^chore\(release\):/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - result="$(bash scripts/compute-release.sh v0.0.0 < /dev/null)"
    - release-cli create --name v1.0.0 --tag-name v1.0.0 --ref "${CI_COMMIT_SHA}"
