# Fixture (Story 23.4-001): structurally complete (release stage, default-branch
# scope, compute-release reuse, loop guard) but never invokes the GitLab Release
# publisher — it only tags. The validator must reject it: Free/Core must publish
# the release through the dedicated GitLab Releases CLI, not a bare git tag.
stages:
  - release

publish-release:
  stage: release
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_TITLE =~ /^chore\(release\):/'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - result="$(bash scripts/compute-release.sh v0.0.0 < /dev/null)"
    - git tag "v1.0.0" "${CI_COMMIT_SHA}"
    - git push origin "v1.0.0"
