# ABOUTME: Registry of adversarial reviewers for the vendor-agnostic review slot.
# ABOUTME: Story 8.1-001 — name, command, timeout, allowed verdicts, plus consensus rule.
#
# The controller reads this file, invokes each enabled reviewer in parallel,
# collects their verdicts, and applies the consensus rule below. Swapping the
# reviewer runtime (Codex -> Gemini -> a stub) is a config change here, not a
# code change in the orchestrator.
#
# Command templates may use {pr_number}, {pr_url}, and {story_id} placeholders;
# the controller substitutes them before invoking the reviewer.

# Consensus rule applied across all enabled reviewers' verdicts.
#   any_block_majority (default): any `block` blocks; otherwise majority wins,
#                                 ties fall back to `request_changes`.
#   unanimous_approve:            every reviewer must `approve`, else block.
consensus: any_block_majority

reviewers:
  # Codex reference implementation of the slot (Story 8.1-002). The wrapper
  # fetches the PR via `gh`, runs a Codex review skill (roast/project-review),
  # and emits this schema's JSON. Enabled by default for FX's environment;
  # users without Codex set `enabled: false` (see docs/adversarial-review.md).
  codex:
    # Single source of truth (Story 20.3-002): `harness: codex` makes this
    # reviewer a *view* over the `codex` entry in controller/src/sdlc/config/harnesses.yaml.
    # That harness entry owns whether Codex is available (its `enabled` flag and
    # probe); this entry owns only the review-role specifics — the command,
    # timeout, and verdict vocabulary Epic-08's consensus needs. The `sdlc build`
    # preflight (reconcile_reviewer_registry) fails fast if the link dangles or if
    # this reviewer is enabled while the harness is disabled, so the two registries
    # can never present two competing Codex configurations.
    harness: codex
    command: "codex-adversarial-review.sh --pr-number {pr_number}"
    timeout_sec: 300
    enabled: true
    allowed_verdicts: ["approve", "request_changes", "block"]
  gemini:
    command: "gemini-review --pr {pr_url} --format json"
    timeout_sec: 300
    enabled: false
    allowed_verdicts: ["approve", "request_changes", "block"]
