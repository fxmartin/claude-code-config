name: CI

on:
  pull_request:
  push:
    branches: [main]

# Static checks are read-only: drop the default token to least privilege.
permissions:
  contents: read

jobs:
  # Story 9.2-001: secrets must be caught before any build/test job runs so a
  # leaked credential is never echoed into later job logs. This job runs the
  # gitleaks CLI directly (`detect --no-banner --redact`) against the repo;
  # the build-like jobs (behavior-tests, controller-smoke, smoke-test) gate on
  # it via `needs: secrets-scan` to fail fast. The same .gitleaks.toml drives
  # the local pre-commit hook, so CI and local scans stay in lockstep.
  secrets-scan:
    name: Secret detection (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so detect scans every commit on the branch, not just
          # the tip — a secret introduced and "reverted" earlier still counts.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          version="8.30.1"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          curl -fsSL "$url" | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks (redacted, fail on any finding)
        run: gitleaks detect --no-banner --redact --config .gitleaks.toml

  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # skills/model-shelf is a git submodule; fetch it so structural
          # checks and installs see the real content, not an empty dir.
          submodules: true

      - name: "Shellcheck (severity floor: warning)"
        run: |
          shellcheck --version
          shellcheck --severity=warning \
            hooks/*.sh \
            scripts/*.sh \
            tests/*.sh \
            install.sh \
            install/*.sh \
            statusline-command.sh

      - name: Validate JSON (jq -e .)
        run: |
          jq --version
          fail=0
          for f in \
            .claude-plugin/*.json \
            plugins/*/.claude-plugin/*.json \
            mcp/*.json \
            settings.json \
            keybindings.json
          do
            [ -e "$f" ] || continue
            if jq -e . "$f" > /dev/null; then
              echo "ok   $f"
            else
              echo "FAIL $f"
              fail=1
            fi
          done
          exit "$fail"

      - name: Verify plugin marketplace structure (Story 6.4-001 path B)
        # Structural check that the `/plugin marketplace add fxmartin/...`
        # path resolves cleanly: marketplace manifest valid, plugin manifest
        # valid, every declared skill has a matching SKILL.md frontmatter.
        # Companion to the smoke-test job (path A: install.sh --core).
        run: bash scripts/verify-plugin-install.sh

      - name: Markdown link check
        run: |
          npm install -g markdown-link-check@3
          fail=0
          while IFS= read -r f; do
            if ! markdown-link-check -q -c .markdown-link-check.json "$f"; then
              fail=1
            fi
          done < <(git ls-files '*.md')
          exit "$fail"

  supply-chain-scan:
    name: Supply-chain pattern scan (hooks/skills/MCP/settings)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Story 13.2-001: treat installed hooks/skills/MCP/settings as supply-chain
    # artifacts and fail the PR on a BLOCK so a poisoned or accidentally unsafe
    # config never merges unreviewed.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # skills/model-shelf is a git submodule that ships an installed skill;
          # it is part of the supply-chain surface, so fetch it and scan its
          # real content (an empty submodule dir would silently skip it).
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Scan for dangerous patterns (fail on BLOCK)
        run: bash scripts/supply-chain-scan.sh

  contract-checks:
    name: Contract checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate agent registry
        run: ./scripts/validate-agent-registry.sh

  commit-format:
    name: Commit format (commitlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only PR commits are linted; existing history on main is exempt.
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint PR commits
        run: |
          npm install --no-save \
            @commitlint/cli@21 \
            @commitlint/config-conventional@21
          npx commitlint --from origin/main --to HEAD --verbose

  behavior-tests:
    name: Behavior tests (bats)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Gate on the secrets scan so a leaked credential fails the build before any
    # test job runs and risks echoing the secret (Story 9.2-001).
    needs: secrets-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up bats-core
        uses: bats-core/bats-action@3.0.1
        with:
          support-install: false
          assert-install: false
          detik-install: false
          file-install: false

      - name: Install uv
        # tests/sast-scan.bats and tests/osv-scan.bats drive the controller's
        # `sdlc sast` / `sdlc depscan` classifiers via `uv run`, so uv must be
        # on PATH for the bats job.
        uses: astral-sh/setup-uv@v5

      - name: Run bats suites
        run: |
          bats --version
          jq --version
          bats tests/notify-telegram.bats tests/install-dry-run.bats tests/smoke-test.bats tests/plugin-install-paths.bats tests/risk-gate.bats tests/codex-adversarial-review.bats tests/codex-build-adapter.bats tests/sast-scan.bats tests/osv-scan.bats tests/gitleaks-secrets.bats tests/supply-chain-scan.bats tests/hook-profile.bats

  controller-smoke:
    name: Controller CLI smoke test (uv tool install)
    # Story 7.1-001: install the sdlc controller CLI and verify `sdlc --version`
    # matches the version declared in controller/pyproject.toml. Runs on macOS
    # and Ubuntu (WSL2 stand-in) since the install path must work on both.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    # Fail fast on leaked secrets before standing up the controller (9.2-001).
    needs: secrets-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install controller CLI
        run: bash scripts/install-controller.sh

      - name: Verify sdlc --version matches pyproject
        run: |
          expected="$(uv run --no-project python -c 'import tomllib,pathlib;print(tomllib.loads(pathlib.Path("controller/pyproject.toml").read_text())["project"]["version"])')"
          actual="$(sdlc --version)"
          echo "expected=$expected actual=$actual"
          test "$expected" = "$actual"

      - name: Verify sdlc validate round-trip from an arbitrary cwd
        # Epic-07 E2E regression guard: the JSON schemas must ship inside the
        # installed wheel so `sdlc validate` works once the source tree is gone.
        # Run from a tmp dir (no `controller/schemas/` sibling) so a path-based
        # schema lookup would FileNotFoundError here.
        run: |
          cd "$(mktemp -d)"
          printf '<<<RESULT_JSON>>>\n{"branch_name":"x","build_status":"SUCCESS","commit_sha":"abc123"}\n<<<END_RESULT>>>\n' \
            | sdlc validate build
          # An invalid block must exit non-zero.
          if printf '<<<RESULT_JSON>>>\n{}\n<<<END_RESULT>>>\n' | sdlc validate build; then
            echo "expected non-zero exit for invalid block" >&2
            exit 1
          fi

      - name: Verify generated skills match neutral sources (Story 20.4-003)
        # Cross-harness parity gate: every committed shared-skills/<name>.md must
        # be exactly what its harness-neutral source regenerates, so the Claude
        # and Codex skill files can never silently diverge. Fails with a diff and
        # the `--fix` regenerate command on drift.
        run: bash scripts/sync-shared-skills.sh verify-generated

      - name: Run controller test suite
        run: |
          cd controller
          uv sync --extra dev
          uv run pytest -q

  smoke-test:
    name: Smoke test (clean-machine install)
    # Story 3.2-002: end-to-end --core happy path on both supported platforms.
    # Matrix covers macOS (the primary target) and Ubuntu (stand-in for WSL2 —
    # GitHub does not provide WSL2 runners, but the codepath is identical
    # except for platform detection, which has its own bats coverage).
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    # Fail fast on leaked secrets before the clean-machine install (9.2-001).
    needs: secrets-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Run smoke test
        run: bash scripts/smoke-test.sh
