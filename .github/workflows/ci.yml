name: CI

on:
  pull_request:
  push:
    branches: [main]

# Static checks are read-only: drop the default token to least privilege.
permissions:
  contents: read

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # skills/model-shelf is a git submodule; fetch it so structural
          # checks and installs see the real content, not an empty dir.
          submodules: true

      - name: "Shellcheck (severity floor: warning)"
        run: |
          shellcheck --version
          shellcheck --severity=warning \
            hooks/*.sh \
            scripts/*.sh \
            test/*.sh \
            install.sh \
            install/*.sh \
            statusline-command.sh

      - name: Validate JSON (jq -e .)
        run: |
          jq --version
          fail=0
          for f in \
            .claude-plugin/*.json \
            plugins/*/.claude-plugin/*.json \
            mcp/*.json \
            settings.json \
            keybindings.json
          do
            [ -e "$f" ] || continue
            if jq -e . "$f" > /dev/null; then
              echo "ok   $f"
            else
              echo "FAIL $f"
              fail=1
            fi
          done
          exit "$fail"

      - name: Verify plugin marketplace structure (Story 6.4-001 path B)
        # Structural check that the `/plugin marketplace add fxmartin/...`
        # path resolves cleanly: marketplace manifest valid, plugin manifest
        # valid, every declared skill has a matching SKILL.md frontmatter.
        # Companion to the smoke-test job (path A: install.sh --core).
        run: bash scripts/verify-plugin-install.sh

      - name: Markdown link check
        run: |
          npm install -g markdown-link-check@3
          fail=0
          while IFS= read -r f; do
            if ! markdown-link-check -q -c .markdown-link-check.json "$f"; then
              fail=1
            fi
          done < <(git ls-files '*.md')
          exit "$fail"

  contract-checks:
    name: Contract checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate agent registry
        run: ./scripts/validate-agent-registry.sh

  commit-format:
    name: Commit format (commitlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only PR commits are linted; existing history on main is exempt.
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint PR commits
        run: |
          npm install --no-save \
            @commitlint/cli@21 \
            @commitlint/config-conventional@21
          npx commitlint --from origin/main --to HEAD --verbose

  behavior-tests:
    name: Behavior tests (bats)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up bats-core
        uses: bats-core/bats-action@3.0.1
        with:
          support-install: false
          assert-install: false
          detik-install: false
          file-install: false

      - name: Run bats suites
        run: |
          bats --version
          jq --version
          bats tests/cmux-bridge.bats tests/install-dry-run.bats tests/smoke-test.bats tests/plugin-install-paths.bats

  smoke-test:
    name: Smoke test (clean-machine install)
    # Story 3.2-002: end-to-end --core happy path on both supported platforms.
    # Matrix covers macOS (the primary target) and Ubuntu (stand-in for WSL2 —
    # GitHub does not provide WSL2 runners, but the codepath is identical
    # except for platform detection, which has its own bats coverage).
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Run smoke test
        run: bash scripts/smoke-test.sh
