name: Risk Gate

# High-risk file approval gate (Epic-08 Story 8.2-001).
#
# Any PR that touches a high-risk path (auth, payments, migrations, infra,
# secrets, destructive shell, ...) is flagged `risk:high` and the `risk-gate`
# check fails until a member of the `risk-approver` GitHub team approves. The
# merge agent (controller side) refuses to merge a `risk:high` PR without that
# human approval and never uses `gh pr merge --admin` to bypass it.
#
# Re-runs on review submission so an approval flips the check from red to green
# without a new push.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  pull_request_review:
    types: [submitted, dismissed]

# Needs to label + comment on the PR; contents:read to diff the change set.
permissions:
  contents: read
  pull-requests: write

# A new push or review supersedes an in-flight gate evaluation for the same PR.
concurrency:
  group: risk-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  RISK_LABEL: "risk:high"
  RISK_TEAM: "risk-approver"
  # Approval label for single-maintainer / personal (non-org) repos, where
  # there is no team to check and a PR author cannot review their own PR. A
  # maintainer (write+ access) applying this label satisfies the gate.
  RISK_APPROVED_LABEL: "risk-approved"

jobs:
  risk-gate:
    name: High-risk file approval gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect high-risk changed files
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Compare the PR head against the merge-base with the target branch.
          git fetch --no-tags origin "${BASE_SHA}" "${HEAD_SHA}" 2>/dev/null || true
          matches="$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}" \
            | bash scripts/risk-gate-detect.sh || true)"

          if [ -n "${matches}" ]; then
            echo "high_risk=true" >> "${GITHUB_OUTPUT}"
            {
              echo "matched<<EOF"
              echo "${matches}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
            echo "High-risk files detected:"
            echo "${matches}"
          else
            echo "high_risk=false" >> "${GITHUB_OUTPUT}"
            echo "No high-risk files in this change set."
          fi

      - name: Label, comment, and require human approval
        if: steps.detect.outputs.high_risk == 'true'
        uses: actions/github-script@v7
        env:
          MATCHED: ${{ steps.detect.outputs.matched }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const riskLabel = process.env.RISK_LABEL;
            const riskTeam = process.env.RISK_TEAM;
            const approvedLabel = process.env.RISK_APPROVED_LABEL;
            const matched = process.env.MATCHED || "";

            // 1. Add the risk:high label (idempotent).
            await github.rest.issues.addLabels({
              owner, repo, issue_number: pr.number, labels: [riskLabel],
            });

            // 2. Post (once) a comment listing matched files + required reviewers.
            const fileLines = matched.split("\n").filter(Boolean)
              .map((l) => "- `" + l.replace(/\t/, "` ← matched `") + "`")
              .join("\n");
            const marker = "<!-- risk-gate-comment -->";
            const body = [
              marker,
              "## :lock: High-risk change detected",
              "",
              "This PR touches high-risk paths and is blocked at merge until a",
              "human approves it. Either path satisfies the gate:",
              "",
              "- a member of the **`" + riskTeam + "`** team submits an approving review, or",
              "- a maintainer (write access) adds the **`" + approvedLabel + "`** label",
              "  (the approval path for single-maintainer / non-org repos).",
              "",
              "The merge agent will not bypass this gate (`--admin` is not used).",
              "",
              "**Matched files:**",
              fileLines,
            ].join("\n");

            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number: pr.number, per_page: 100,
            });
            const existing = comments.data.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr.number, body,
              });
            }

            // 3a. Approving review from a risk-approver team member (org repos).
            const reviews = await github.rest.pulls.listReviews({
              owner, repo, pull_number: pr.number, per_page: 100,
            });
            // Keep only the latest review state per author.
            const latest = new Map();
            for (const r of reviews.data) {
              if (r.user && r.user.login) latest.set(r.user.login, r.state);
            }

            let approvedByTeam = false;
            for (const [login, state] of latest) {
              if (state !== "APPROVED") continue;
              try {
                const membership = await github.rest.teams.getMembershipForUserInOrg({
                  org: owner, team_slug: riskTeam, username: login,
                });
                if (membership.data.state === "active") {
                  approvedByTeam = true;
                  break;
                }
              } catch (err) {
                // Not a team member (404), or owner is a user account with no
                // teams (404) — keep scanning other approvers.
                if (err.status !== 404) throw err;
              }
            }

            // 3b. `risk-approved` label applied by a maintainer (write+ access).
            // This is the approval path for single-maintainer / personal repos,
            // where there is no org team and a PR author cannot approve their
            // own PR. Verifying the labeller's permission stops a drive-by
            // contributor from self-approving by slapping the label on.
            let approvedByLabel = false;
            const prNow = await github.rest.pulls.get({
              owner, repo, pull_number: pr.number,
            });
            const hasApprovedLabel = (prNow.data.labels || [])
              .some((l) => l.name === approvedLabel);
            if (hasApprovedLabel) {
              const events = await github.paginate(github.rest.issues.listEvents, {
                owner, repo, issue_number: pr.number, per_page: 100,
              });
              const labellers = events
                .filter((e) => e.event === "labeled"
                  && e.label && e.label.name === approvedLabel)
                .map((e) => e.actor && e.actor.login)
                .filter(Boolean);
              for (const login of labellers) {
                // The repo owner (personal repos) is always a maintainer.
                if (login === owner) {
                  approvedByLabel = true;
                  break;
                }
                try {
                  const perm = await github.rest.repos.getCollaboratorPermissionLevel({
                    owner, repo, username: login,
                  });
                  // permission is one of: admin | write | read | none.
                  if (perm.data.permission === "admin"
                    || perm.data.permission === "write") {
                    approvedByLabel = true;
                    break;
                  }
                } catch (err) {
                  // Token may lack scope to read collaborator permission (403)
                  // or the user is not a collaborator (404). Either way this
                  // labeller does not count — keep scanning.
                  if (err.status !== 403 && err.status !== 404) throw err;
                }
              }
            }

            if (!approvedByTeam && !approvedByLabel) {
              core.setFailed(
                "Risk gate: this high-risk PR needs human approval — either an " +
                "approving review from a `" + riskTeam + "` team member, or the " +
                "`" + approvedLabel + "` label added by a maintainer."
              );
            } else if (approvedByTeam) {
              core.info("Risk gate: approved by a " + riskTeam + " team member.");
            } else {
              core.info("Risk gate: approved via the " + approvedLabel + " label.");
            }
