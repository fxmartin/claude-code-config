name: Release

# Automatic release pipeline (Epic-05 Story 5.2-001).
#
# On every push to `main` this workflow computes the next semantic version
# from the Conventional Commits since the last tag, aligns the manifest
# version fields, prepends a CHANGELOG section, commits the bump, tags it
# `vX.Y.Z`, and publishes a GitHub Release with auto-generated notes.
#
# --- Why this cannot infinite-loop -----------------------------------------
# The workflow itself pushes a `chore(release): vX.Y.Z` commit to `main`, which
# is another `push` to `main`. Two independent guards stop a second run:
#   1. The `guard` job skips when the head commit SUBJECT (first line only)
#      starts with `chore(release):` or contains the skip-release token. The
#      release job depends on `guard`, so a bot commit short-circuits before
#      any work. Matching the subject — not the whole message — means a PR
#      body that merely documents the token cannot false-trip the guard.
#   2. Defence in depth: even if guard 1 were bypassed, `compute-release.sh`
#      would see only the `chore(release):` commit since the new tag, classify
#      it as `BUMP=none`, and exit 0 without tagging.
# Tag pushes do not match `branches: [main]`, so creating the tag never
# retriggers the workflow either.

on:
  push:
    branches: [main]

# Serialise releases: a second push while a release is mid-flight queues
# behind the first instead of racing it to the same tag.
concurrency:
  group: release
  cancel-in-progress: false

# Least privilege: only the release job needs write access (see below).
permissions:
  contents: read

jobs:
  # Guard job — decides whether a release run should proceed at all.
  # Kept separate so the decision (and its reasoning) is visible in the UI.
  guard:
    name: Loop guard
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      proceed: ${{ steps.decide.outputs.proceed }}
    steps:
      - name: Checkout (guard script only)
        uses: actions/checkout@v4

      - name: Decide whether to run
        id: decide
        env:
          # The head commit message of the push that triggered this run.
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          # The decision (subject-only matching) lives in a bats-tested helper
          # so the loop/skip logic cannot silently regress.
          printf '%s' "${HEAD_MSG}" \
            | ./scripts/release-guard.sh >> "${GITHUB_OUTPUT}"

  release:
    name: Compute, tag and publish
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only this job mutates the repo: it pushes the bump commit, the tag, and
    # creates the GitHub Release. Everything else stays read-only.
    permissions:
      contents: write
    steps:
      - name: Checkout (full history for tag discovery)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Push the bump commit and tag as the release deploy key: personal
          # repos cannot grant the Actions app a ruleset bypass, so the deploy
          # key is the bypass actor that gets past the main-branch PR ruleset.
          # Deploy-key pushes retrigger this workflow (unlike GITHUB_TOKEN);
          # the guard job's chore(release) check is what stops the loop.
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: Determine last tag
        id: lasttag
        run: |
          last="$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.0)"
          echo "Last tag: ${last}"
          echo "last=${last}" >> "${GITHUB_OUTPUT}"

      - name: Compute next version
        id: version
        run: |
          last='${{ steps.lasttag.outputs.last }}'
          # Feed every commit subject + body since the last tag to the bumper.
          # %B is the raw body; the range is exclusive of the tag itself.
          result="$(git log "${last}..HEAD" --pretty=format:'%B%n' \
            | ./scripts/compute-release.sh "${last}")"
          echo "${result}"
          bump="$(echo "${result}" | sed -n 's/^BUMP=//p')"
          version="$(echo "${result}" | sed -n 's/^VERSION=//p')"
          echo "bump=${bump}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: No release needed
        if: steps.version.outputs.bump == 'none'
        run: |
          echo "No feat/fix/perf/refactor or breaking commits since \
            ${{ steps.lasttag.outputs.last }} — nothing to release."

      - name: Stop early if tag already exists (idempotency)
        id: exists
        if: steps.version.outputs.bump != 'none'
        run: |
          version='${{ steps.version.outputs.version }}'
          if git rev-parse -q --verify "refs/tags/${version}" >/dev/null; then
            echo "Tag ${version} already exists — re-run is a clean no-op."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Update manifest versions
        if: steps.version.outputs.bump != 'none' && steps.exists.outputs.skip != 'true'
        run: |
          version='${{ steps.version.outputs.version }}'
          # JSON `version` fields drop the `v` prefix (npm/semver convention).
          number="${version#v}"
          plugin='plugins/autonomous-sdlc/.claude-plugin/plugin.json'
          marketplace='.claude-plugin/marketplace.json'
          tmp="$(mktemp)"

          jq --arg v "${number}" '.version = $v' "${plugin}" > "${tmp}"
          mv "${tmp}" "${plugin}"

          # marketplace.json carries the release version at the top level;
          # keep it in lockstep with the tag.
          tmp="$(mktemp)"
          jq --arg v "${number}" '.version = $v' "${marketplace}" > "${tmp}"
          mv "${tmp}" "${marketplace}"

          echo "Manifests set to ${number}:"
          jq -r '.version' "${plugin}" "${marketplace}"

      - name: Update CHANGELOG
        if: steps.version.outputs.bump != 'none' && steps.exists.outputs.skip != 'true'
        run: |
          version='${{ steps.version.outputs.version }}'
          last='${{ steps.lasttag.outputs.last }}'
          today="$(date -u +%Y-%m-%d)"
          section="$(mktemp)"

          # Build the new CHANGELOG section from the commit log. Grouping
          # mirrors Keep a Changelog: feat -> Added, fix -> Fixed, the rest
          # -> Changed. The section file is reused as the release notes body.
          {
            echo "## [${version}] - ${today}"
            echo

            added="$(git log "${last}..HEAD" --no-merges \
              --pretty=format:'%s' | grep -E '^feat(\(|!|:)' || true)"
            fixed="$(git log "${last}..HEAD" --no-merges \
              --pretty=format:'%s' | grep -E '^fix(\(|!|:)' || true)"
            changed="$(git log "${last}..HEAD" --no-merges \
              --pretty=format:'%s' | grep -E '^(perf|refactor)(\(|!|:)' || true)"

            if [ -n "${added}" ]; then
              echo "### Added"
              echo
              echo "${added}" | awk '{ print "- " $0 }'
              echo
            fi
            if [ -n "${changed}" ]; then
              echo "### Changed"
              echo
              echo "${changed}" | awk '{ print "- " $0 }'
              echo
            fi
            if [ -n "${fixed}" ]; then
              echo "### Fixed"
              echo
              echo "${fixed}" | awk '{ print "- " $0 }'
              echo
            fi
          } > "${section}"

          echo "::group::New CHANGELOG section"
          cat "${section}"
          echo "::endgroup::"

          # Prepend the new section directly under the `## [Unreleased]` line,
          # leaving the rest of the file (header + history) intact.
          if [ -f CHANGELOG.md ] && grep -q '## \[Unreleased\]' CHANGELOG.md; then
            awk -v sect="${section}" '
              { print }
              /^## \[Unreleased\]/ && !done {
                print ""
                while ((getline line < sect) > 0) print line
                done = 1
              }
            ' CHANGELOG.md > CHANGELOG.md.new
            mv CHANGELOG.md.new CHANGELOG.md
          else
            # No CHANGELOG yet — bootstrap a minimal Keep a Changelog file.
            {
              echo "# Changelog"
              echo
              echo "All notable changes to this project are documented in this file."
              echo
              echo "The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/)."
              echo
              echo "## [Unreleased]"
              echo
              cat "${section}"
            } > CHANGELOG.md
          fi

          # Stash the section for the release-notes step.
          cp "${section}" CHANGELOG-SECTION.md

      - name: Commit, tag and push
        if: steps.version.outputs.bump != 'none' && steps.exists.outputs.skip != 'true'
        run: |
          version='${{ steps.version.outputs.version }}'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # CHANGELOG-SECTION.md is a build artifact, not part of the repo.
          git add plugins/autonomous-sdlc/.claude-plugin/plugin.json \
                  .claude-plugin/marketplace.json \
                  CHANGELOG.md

          # The `chore(release):` subject is what guard 1 keys off to prevent
          # this very push from retriggering the workflow.
          git commit -m "chore(release): ${version}"
          git tag -a "${version}" -m "Release ${version}"

          git push origin HEAD:main
          git push origin "refs/tags/${version}"

      - name: Create GitHub Release
        if: steps.version.outputs.bump != 'none' && steps.exists.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version='${{ steps.version.outputs.version }}'
          gh release create "${version}" \
            --title "${version}" \
            --generate-notes \
            --notes-file CHANGELOG-SECTION.md
