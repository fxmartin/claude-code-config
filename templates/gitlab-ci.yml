# ABOUTME: Installable GitLab CI quality-gate template for autonomous-SDLC target repos.
# ABOUTME: Mirrors the GitHub Actions gate set (Epic-02/09) on GitLab Free/Core — no Premium keywords.
#
# Story 23.3-001 — copy this file to the root of a company GitLab repo as
# `.gitlab-ci.yml`. It brings the same quality gates the framework enforces on
# GitHub Actions to a GitLab Merge Request, so the autonomous build loop can gate
# the merge on a GitLab CI pipeline (Story 23.2-002): a red pipeline blocks merge.
#
# Gate parity (GitHub Actions ↔ GitLab CI) is documented in
# docs/gitlab-ci-template.md. Every job below maps 1:1 to a GitHub gate.
#
# Free/Core only: no merge trains, no Premium/Ultimate-only keywords. The
# pipeline runs on Merge Request events and on pushes to the default branch —
# the GitLab equivalent of `on: [pull_request, push: branches: [main]]`.
#
# Assumptions for the target repo (verified by the adoption preflight, 23.6-002):
#   - `.gitleaks.toml`     — gitleaks allowlist/config (secret scan)
#   - `.commitlintrc.json` — commitlint config (commit-format gate)
#   - a Python project managed with `uv` (pytest + ruff), and `tests/*.bats`.
# Jobs whose tooling a given repo does not use can be removed; the validator
# (`scripts/validate-gitlab-ci.sh`) checks the full gate set is present.

stages:
  - secret-scan
  - lint
  - test

# Run only for Merge Request pipelines and pushes to the default branch. This
# avoids duplicate branch-pipeline + MR-pipeline runs on the same commit.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ---------------------------------------------------------------------------
# Secret scan — must pass before any test job runs so a leaked credential is
# never echoed into later job logs (GitHub: `secrets-scan`, Story 9.2-001).
# Uses the same .gitleaks.toml as the local pre-commit hook and the GitHub job.
# ---------------------------------------------------------------------------
secrets-scan:
  stage: secret-scan
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --no-banner --redact --config .gitleaks.toml

# ---------------------------------------------------------------------------
# Lint — shell (shellcheck) and Python (ruff). GitHub: `static-checks`.
# ---------------------------------------------------------------------------
shellcheck:
  stage: lint
  image: koalaman/shellcheck-alpine:stable
  before_script:
    # The shellcheck-alpine image ships no git; `git ls-files` below needs it.
    - apk add --no-cache git
  script:
    # Severity floor matches the GitHub static-checks job.
    - shellcheck --severity=warning $(git ls-files '*.sh')

ruff:
  stage: lint
  image: ghcr.io/astral-sh/ruff:latest
  script:
    - ruff check .

# JSON validity + JSON-schema / contract checks. GitHub: `static-checks`
# ("Validate JSON") + `contract-checks`.
json-schema:
  stage: lint
  image: alpine:latest
  before_script:
    - apk add --no-cache jq git
  script:
    - |
      fail=0
      for f in $(git ls-files '*.json'); do
        if jq -e . "$f" >/dev/null; then
          echo "ok   $f"
        else
          echo "FAIL $f"
          fail=1
        fi
      done
      exit "$fail"

# ---------------------------------------------------------------------------
# Commit format — commitlint over the MR commits only. GitHub: `commit-format`
# (guarded by `if: pull_request`). On GitLab we diff against the MR base sha so
# protected default-branch history stays exempt.
# ---------------------------------------------------------------------------
commit-format:
  stage: lint
  image: node:22-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    - apk add --no-cache git
  script:
    - npm install --no-save @commitlint/cli@21 @commitlint/config-conventional@21
    - npx commitlint --from "$CI_MERGE_REQUEST_DIFF_BASE_SHA" --to HEAD --verbose

# ---------------------------------------------------------------------------
# High-risk file approval gate — the GitLab port of .github/workflows/risk-gate.yml
# (Epic-08 Story 8.2-001; ported in Story 23.5-002). Any MR that touches a
# high-risk path (auth, payments, migrations, infra, secrets, destructive
# shell, ...) is flagged `risk:high` and this job FAILS until a maintainer adds
# the `risk-approved` label — the merge CI gate (Story 23.2-002) then blocks the
# merge on the red pipeline. GitHub: `risk-gate` (guarded by `if: pull_request`).
#
# The detector (scripts/risk-gate-detect.sh) is reused byte-for-byte from the
# GitHub job. It requires the target repo to vendor both
# scripts/risk-gate-detect.sh AND controller/src/sdlc/config/high-risk-patterns.yaml
# at the same relative paths (or point RISK_GATE_CONFIG elsewhere).
#
# GitLab Free/Core limitation vs GitHub: a label event does NOT retrigger the
# pipeline. On GitHub the workflow re-runs on the `labeled` event and turns the
# check green automatically; on GitLab Free/Core, after a maintainer adds
# `risk-approved` they must retry THIS job (`glab ci retry` / the pipeline UI) —
# no new push is needed, but the green flip is a manual retry.
risk-gate:
  stage: lint
  image: alpine:latest
  # The diff needs the MR base sha in the clone; a shallow clone may omit it.
  variables:
    GIT_DEPTH: "0"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    # alpine ships neither bash (the detector needs it) nor git/curl.
    - apk add --no-cache bash git curl
  script:
    - |
      set -eu
      # Diff the MR against its target-branch base and feed the changed paths to
      # the shared detector. Exit 0 = matched (PATH<TAB>PATTERN on stdout),
      # 1 = clean, 2 = config error. `|| true` keeps a clean diff from killing
      # the job (mirrors the GitHub workflow).
      matches="$(git diff --name-only "$CI_MERGE_REQUEST_DIFF_BASE_SHA" \
        | bash scripts/risk-gate-detect.sh || true)"

      # Best-effort MR labelling via the REST API. Token priority mirrors the
      # host-adapter convention: GITLAB_TOKEN → GL_TOKEN → CI_JOB_TOKEN. When no
      # token is present (or the call fails) the job warns and continues — it
      # still enforces the gate through its exit code below.
      token=""
      if   [ -n "${GITLAB_TOKEN:-}" ]; then token="$GITLAB_TOKEN"
      elif [ -n "${GL_TOKEN:-}" ];     then token="$GL_TOKEN"
      elif [ -n "${CI_JOB_TOKEN:-}" ]; then token="$CI_JOB_TOKEN"
      fi
      mr_api="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}"
      set_label() {
        # $1 = add_labels|remove_labels, $2 = label
        if [ -z "$token" ]; then
          echo "risk-gate: no token (GITLAB_TOKEN/GL_TOKEN/CI_JOB_TOKEN) — skipping best-effort $1=$2."
          return 0
        fi
        curl -fsS --request PUT --header "PRIVATE-TOKEN: $token" \
          --data-urlencode "$1=$2" "$mr_api" >/dev/null \
          || echo "risk-gate: label API call failed ($1=$2) — continuing (best-effort)."
      }

      if [ -z "$matches" ]; then
        echo "risk-gate: no high-risk files in this change set."
        set_label remove_labels "risk:high"
        exit 0
      fi

      echo "risk-gate: high-risk files detected:"
      echo "$matches"
      set_label add_labels "risk:high"

      # Approval check: CI_MERGE_REQUEST_LABELS is the MR's comma-separated label
      # list. The `risk-approved` label (added by a maintainer) satisfies the gate
      # — the Free/Core equivalent of the GitHub team-review path (Story 23.5-001).
      case ",${CI_MERGE_REQUEST_LABELS:-}," in
        *,risk-approved,*)
          echo "risk-gate: approved via the risk-approved label."
          exit 0
          ;;
      esac

      echo "risk-gate: this high-risk MR needs human approval." >&2
      echo "A maintainer must add the 'risk-approved' label, then retry this job" >&2
      echo "(glab ci retry / the pipeline UI). GitLab Free/Core does not retrigger" >&2
      echo "the pipeline on a label event, so no new push is needed." >&2
      exit 1

# ---------------------------------------------------------------------------
# Tests — Python (pytest) and behaviour (bats). GitHub: `controller-smoke`
# (pytest) + `behavior-tests` (bats). Both gate on the secret scan so a leaked
# credential fails the build before any test job echoes it (Story 9.2-001).
# ---------------------------------------------------------------------------
pytest:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  needs:
    - secrets-scan
  script:
    - uv sync --extra dev
    - uv run pytest -q

bats:
  stage: test
  image: bats/bats:latest
  needs:
    - secrets-scan
  script:
    - bats tests/
